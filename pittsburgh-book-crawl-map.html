var colors = { open: "#2e9b3f", closed: "#d33", unknown: "#999" };
var labels = { open: "OPEN", closed: "CLOSED", unknown: "UNCONFIRMED" };
var SRC = { gem: "Gemini · Google Maps", mine: "My web research" };

var state = { source: "gem", day: "Mon" };

// ---- Visited check-offs, persisted in localStorage (keyed by a stable slug,
// so progress survives page reloads AND future rebuilds of this HTML) ----
var VISIT_KEY = "pgh-book-crawl-visited-v1";
function slug(n){ return n.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, ""); }
var visited = {};
try { visited = JSON.parse(localStorage.getItem(VISIT_KEY) || "{}") || {}; } catch (e) { visited = {}; }
function isVisited(st){ return !!visited[slug(st.n)]; }
function saveVisited(){ try { localStorage.setItem(VISIT_KEY, JSON.stringify(visited)); } catch (e) {} }

function hoursOf(store, source, day){ return store[source].h[day]; }
function statusFor(store, source, day){
  var v = hoursOf(store, source, day);
  if (!v || v === "Unknown") return "unknown";
  if (v.toLowerCase().indexOf("closed") === 0) return "closed";
  return "open";
}

var map = L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19, attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var bounds = [], markers = [];
stores.forEach(function(st){
  bounds.push([st.lat, st.lon]);
  var m = L.circleMarker([st.lat, st.lon], { radius: 9, color: "#000", weight: 1, fillOpacity: 0.9 }).addTo(map);
  markers.push({ marker: m, store: st });
});
map.fitBounds(bounds, { padding: [40, 40] });

function popupHtml(st){
  var source = state.source, day = state.day;
  var status = statusFor(st, source, day);
  var hrs = hoursOf(st, source, day);
  var gmaps = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(st.a);
  var srcCite = source === "gem"
    ? 'Source: <b>Gemini (Google Maps)</b>'
    : 'Source: <a href="' + st.mine.u + '" target="_blank">' + st.mine.u + '</a> <span class="conf">(' + st.mine.c + ' confidence)</span>';

  // show the other source's value for the same day if it differs
  var other = source === "gem" ? "mine" : "gem";
  var otherHrs = hoursOf(st, other, day);
  var altLine = (otherHrs !== hrs)
    ? '<div class="alt">⚠ ' + (other === "gem" ? "Gemini" : "My research") + ' says: <b>' + otherHrs + '</b></div>'
    : '';

  var v = isVisited(st);
  var s = slug(st.n);
  return '<div class="popup-title">' + (v ? "✓ " : "") + st.n + '</div>' +
    '<span class="badge" style="background:' + colors[status] + '">' + labels[status] + ' · ' + DAYNAMES[day] + '</span>' +
    '<div class="popup-hours">' + DAYNAMES[day] + ': <b>' + hrs + '</b></div>' +
    altLine +
    '<div style="color:#555;margin-top:4px">' + st.a + '</div>' +
    '<div class="src">' + srcCite + '</div>' +
    '<div style="margin-top:6px"><a href="' + gmaps + '" target="_blank">Directions ↗</a></div>' +
    '<div class="visit-line"><label><input type="checkbox" ' + (v ? "checked" : "") +
      ' onchange="toggleVisited(\'' + s + '\')"> Visited this store</label></div>';
}

// find the marker record for a given slug
function findBySlug(s){
  for (var i = 0; i < markers.length; i++) { if (slug(markers[i].store.n) === s) return markers[i]; }
  return null;
}

// toggle from a popup checkbox, persist, and refresh just that marker + counts
window.toggleVisited = function(s){
  if (visited[s]) { delete visited[s]; } else { visited[s] = true; }
  saveVisited();
  var rec = findBySlug(s);
  if (rec) { styleMarker(rec); rec.marker.setPopupContent(popupHtml(rec.store)); }
  updateVisitedCount();
};

function updateVisitedCount(){
  document.getElementById('c-visited').textContent = Object.keys(visited).length;
}

// style one marker for current source/day, dimming + gold ring if visited
function styleMarker(mm){
  var status = statusFor(mm.store, state.source, state.day);
  if (isVisited(mm.store)) {
    mm.marker.setStyle({ fillColor: colors[status], color: "#b8860b", weight: 3, fillOpacity: 0.30 });
  } else {
    mm.marker.setStyle({ fillColor: colors[status], color: "#000", weight: 1, fillOpacity: 0.90 });
  }
}

function render(){
  var counts = { open:0, closed:0, unknown:0 };
  markers.forEach(function(mm){
    var status = statusFor(mm.store, state.source, state.day);
    counts[status]++;
    styleMarker(mm);
    mm.marker.bindPopup(popupHtml(mm.store));
  });
  document.getElementById('c-open').textContent = "(" + counts.open + ")";
  document.getElementById('c-closed').textContent = "(" + counts.closed + ")";
  document.getElementById('c-unknown').textContent = "(" + counts.unknown + ")";
  updateVisitedCount();
}

// source buttons
var srcDiv = document.getElementById('sources');
[["gem","Gemini (Google Maps)"],["mine","My research"]].forEach(function(pair){
  var b = document.createElement('button');
  b.textContent = pair[1]; b.dataset.src = pair[0];
  b.onclick = function(){
    state.source = pair[0];
    document.querySelectorAll('.src-row button').forEach(function(x){ x.classList.remove('active'); });
    b.classList.add('active'); render();
  };
  srcDiv.appendChild(b);
});

// day buttons
var daysDiv = document.getElementById('days');
DAYS.forEach(function(d){
  var b = document.createElement('button');
  b.textContent = d; b.dataset.day = d;
  b.onclick = function(){
    state.day = d;
    document.querySelectorAll('.days button').forEach(function(x){ x.classList.remove('active'); });
    b.classList.add('active'); render();
  };
  daysDiv.appendChild(b);
});

// reset all check-offs
document.getElementById('reset-visited').onclick = function(){
  if (!Object.keys(visited).length || confirm("Clear all visited check-offs?")) {
    visited = {}; saveVisited(); render();
  }
};

// defaults: Gemini source, Monday
srcDiv.querySelector('button[data-src="gem"]').classList.add('active');
daysDiv.querySelector('button[data-day="Mon"]').classList.add('active');
render();
</script>
</body>
</html>
